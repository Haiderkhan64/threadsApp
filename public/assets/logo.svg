<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle - Changed to purple -->
  <circle cx="100" cy="100" r="90" fill="#6B46C1"/>
  
  <!-- Thread lines forming a speech bubble / conversation thread -->
  <path d="M60 80 Q100 80, 100 110 T140 140" 
        stroke="#FFFFFF" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"/>
  
  <path d="M60 110 Q100 110, 100 140 T140 170" 
        stroke="#FFFFFF" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.7"/>
  
  <path d="M60 140 Q100 140, 100 170 T140 200" 
        stroke="#FFFFFF" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.4"/>
  
  <!-- Dot at the start of threads -->
  <circle cx="60" cy="80" r="8" fill="#FFFFFF"/>
</svg>
